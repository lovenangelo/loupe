{% extends "base.html" %}
{% block title %}Edit Comment - Loupe{% endblock %}
{% block content %}
<div class="flex items-center gap-3 mb-6">
    <a href="{% url 'reviews:issue_detail' issue_id=comment.issue.id %}" class="text-primary hover:underline text-sm">&larr; Back to {{ comment.issue.title }}</a>
</div>

<h1 class="text-2xl font-bold text-card-foreground mb-6">Edit Comment</h1>

<div class="bg-card rounded-lg border border-border p-6 max-w-lg shadow-sm">
    <form method="post" action="{% url 'reviews:edit_comment' comment_id=comment.id %}">
        {% csrf_token %}
        <div class="mb-4">
            <label for="id_body" class="block text-sm font-medium text-foreground mb-1">Comment</label>
            {{ form.body }}
            {% if form.body.errors %}
            <p class="text-red-600 text-sm mt-1">{{ form.body.errors.0 }}</p>
            {% endif %}
        </div>
        <div class="flex gap-2">
            <button type="submit" class="bg-primary text-primary-foreground px-4 py-2 rounded-md text-sm font-medium hover:opacity-90 transition-opacity">Save</button>
            <a href="{% url 'reviews:issue_detail' issue_id=comment.issue.id %}" class="border border-border text-foreground px-4 py-2 rounded-md text-sm hover:bg-muted transition-colors">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
