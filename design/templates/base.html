{% load static tailwind_tags %}
<!DOCTYPE html>
<html>
    <head>
        <title>
            {% block title %}Loupe{% endblock %}
        </title>
        {% block extra_head %}{% endblock %}
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        background: 'var(--background)',
                        foreground: 'var(--foreground)',
                        card: { DEFAULT: 'var(--card)', foreground: 'var(--card-foreground)' },
                        primary: { DEFAULT: 'var(--primary)', foreground: 'var(--primary-foreground)' },
                        secondary: { DEFAULT: 'var(--secondary)', foreground: 'var(--secondary-foreground)' },
                        muted: { DEFAULT: 'var(--muted)', foreground: 'var(--muted-foreground)' },
                        accent: { DEFAULT: 'var(--accent)', foreground: 'var(--accent-foreground)' },
                        destructive: { DEFAULT: 'var(--destructive)', foreground: 'var(--destructive-foreground)' },
                        border: 'var(--border)',
                        input: 'var(--input)',
                        ring: 'var(--ring)',
                    },
                    borderRadius: {
                        lg: 'var(--radius)',
                        md: 'calc(var(--radius) - 2px)',
                        sm: 'calc(var(--radius) - 4px)',
                    },
                },
            },
        }
        </script>
        <style>
            :root {
                --background: oklch(0.9818 0.0054 95.0986);
                --foreground: oklch(0.3438 0.0269 95.7226);
                --card: oklch(0.9818 0.0054 95.0986);
                --card-foreground: oklch(0.1908 0.0020 106.5859);
                --primary: oklch(0.6171 0.1375 39.0427);
                --primary-foreground: oklch(1.0000 0 0);
                --secondary: oklch(0.9245 0.0138 92.9892);
                --secondary-foreground: oklch(0.4334 0.0177 98.6048);
                --muted: oklch(0.9341 0.0153 90.2390);
                --muted-foreground: oklch(0.6059 0.0075 97.4233);
                --accent: oklch(0.9245 0.0138 92.9892);
                --accent-foreground: oklch(0.2671 0.0196 98.9390);
                --destructive: oklch(0.1908 0.0020 106.5859);
                --destructive-foreground: oklch(1.0000 0 0);
                --border: oklch(0.8847 0.0069 97.3627);
                --input: oklch(0.7621 0.0156 98.3528);
                --ring: oklch(0.6171 0.1375 39.0427);
                --radius: 0.5rem;
            }
            body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
        </style>
    </head>
    <body class="bg-background text-foreground min-h-screen">
        <nav class="bg-card border-b border-border">
            <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
                <a href="{% url 'reviews:index' %}" class="text-xl font-bold text-primary">Loupe</a>
                <a href="{% url 'reviews:create' %}" class="bg-primary text-primary-foreground px-4 py-2 rounded-md text-sm font-medium hover:opacity-90 transition-opacity">New Review</a>
            </div>
        </nav>

        {% if messages %}
        <div class="max-w-5xl mx-auto px-4 mt-4">
            {% for message in messages %}
            <div class="rounded-md px-4 py-3 mb-2 text-sm border {% if message.tags == 'success' %}bg-green-50 text-green-800 border-green-200{% elif message.tags == 'error' %}bg-red-50 text-red-800 border-red-200{% else %}bg-accent text-accent-foreground border-border{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <main class="max-w-5xl mx-auto px-4 py-8">
            {% block content %}{% endblock %}
        </main>
    </body>
</html>
